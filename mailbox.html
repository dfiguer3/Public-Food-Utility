<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mailbox • Public Food Utility</title>
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./script.js"></script>
    <script defer src="./profile-drawer.js"></script>
  </head>
  <body class="app">
    <main class="screen" data-screen="mailbox">
      <div class="phone puf-frame" role="application" aria-label="Mailbox">
        <div class="profile-backdrop" data-profile-backdrop aria-hidden="true"></div>
        <section
          class="profile-drawer"
          data-profile-drawer
          data-peek="56"
          data-open-ratio="0.75"
          role="dialog"
          aria-label="Profile drawer"
          aria-hidden="true"
        >
          <div class="profile-drawer-peek" data-profile-handle>
            <div class="profile-drawer-handle" aria-hidden="true"></div>
            <button type="button" data-profile-peek-btn class="snap-custom-btn" aria-label="Open profile">
              Profile
            </button>
          </div>
          <div class="profile-drawer-content" aria-label="Profile content">
            <div class="profile-icon" aria-hidden="true"></div>
            <div class="sheet sheet-profile" aria-label="Profile details">
              <h1 class="page-title">Profile</h1>
              <div class="profile-row">
                <div class="profile-label">Name</div>
                <div class="profile-value">Anonymous</div>
              </div>
              <div class="profile-row">
                <div class="profile-label">Location</div>
                <div class="profile-value">Knoxville</div>
              </div>
            </div>
          </div>
        </section>

        <div class="puf-soft-top" aria-hidden="true"></div>
        <div class="puf-circle" aria-hidden="true"></div>
        <div class="puf-circle-inner" aria-hidden="true"></div>
        <div
          class="puf-noisy"
          aria-hidden="true"
          style="background-image:url('https://www.figma.com/api/mcp/asset/2492ce30-0597-472d-bd33-0ec004ddf286')"
        ></div>

        <header class="puf-header">
          <button class="puf-menu" type="button" data-modal="menu" aria-label="Menu">
            <img alt="" src="https://www.figma.com/api/mcp/asset/3bef6980-3dde-43dd-8a42-acb17ef3df05" />
          </button>

          <div class="puf-title" aria-label="App title">Your Plate</div>

          <a class="puf-avatar" href="profile.html" aria-label="Profile">
            <img alt="" src="https://www.figma.com/api/mcp/asset/c1db0ae8-f5c0-4279-b100-7b833cb7da61" />
          </a>
        </header>

        <nav class="puf-float-nav" aria-label="Primary navigation">
          <a href="index.html" aria-label="Nearby">
            <img alt="" width="49" height="49" src="https://www.figma.com/api/mcp/asset/94b2a2af-cf45-4d6f-9259-20340ca49569" />
          </a>
          <a href="snap.html" aria-label="SNAP">
            <img alt="" width="51" height="51" src="https://www.figma.com/api/mcp/asset/1152ace2-af55-40e1-b485-f1be4cc14629" />
          </a>
          <a href="support.html" aria-label="Support">
            <img alt="" width="48" height="48" src="https://www.figma.com/api/mcp/asset/80c7141c-c30a-4aae-82f3-80a895cc569e" />
          </a>
          <a class="is-active" href="mailbox.html" aria-current="page" aria-label="Mailbox">
            <img alt="" width="45" height="45" src="https://www.figma.com/api/mcp/asset/e13a76ba-1683-4954-abe6-00772ca502c5" />
          </a>
        </nav>

        <div class="puf-scroll" aria-label="Inbox">
          <div class="puf-scroll-stage" style="height:640px">
            <h1 class="puf-section-title" style="top:16px">Inbox</h1>

            <a class="puf-card" href="mail.html" aria-label="Message 1" style="top:71px"></a>
            <a class="puf-card" href="mail.html" aria-label="Message 2" style="top:196px"></a>
            <a class="puf-card" href="mail.html" aria-label="Message 3" style="top:320px"></a>
            <a class="puf-card" href="mail.html" aria-label="Message 4" style="top:445px"></a>
          </div>
        </div>
      </div>
    </main>

    <dialog class="modal" data-modal-root="menu" aria-label="Menu">
      <form method="dialog" class="modal-backdrop">
        <div class="modal-sheet" role="document">
          <div class="modal-head">
            <div class="modal-title">Menu</div>
            <button class="icon-btn" value="cancel" aria-label="Close">
              <span class="icon icon-x" aria-hidden="true"></span>
            </button>
          </div>
          <nav class="modal-nav" aria-label="Menu links">
            <a href="index.html">Home</a>
            <a href="map.html">Map</a>
            <a href="snap.html">SNAP</a>
            <a href="support.html">Support</a>
            <a href="emergency.html">Emergency</a>
            <a href="profile.html">Profile</a>
          </nav>
        </div>
      </form>
    </dialog>
  </body>
</html>
