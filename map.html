<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Map • Public Food Utility</title>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.7.0/mapbox-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body class="app">
    <main class="screen" data-screen="map">
      <div class="phone" role="application" aria-label="Map">
        <div class="phone-bg" aria-hidden="true"></div>

        <div class="profile-backdrop" data-profile-backdrop aria-hidden="true"></div>
        <section
          class="profile-drawer"
          data-profile-drawer
          data-peek="56"
          data-open-ratio="0.75"
          role="dialog"
          aria-label="Profile drawer"
          aria-hidden="true"
        >
          <div class="profile-drawer-content" aria-label="Profile content">
            <button class="profile-avatar-edit" type="button" data-action="edit-profile-photo" aria-label="Change photo">
              Change
            </button>
            <input
              class="profile-avatar-input"
              type="file"
              accept="image/*"
              data-profile-photo-input
              aria-label="Upload profile photo"
            />

            <div class="profile-plate">
              <div class="profile-plate__rim"></div>
              <div class="profile-plate__well"></div>
              <div class="profile-plate__shine"></div>
              <img
                class="profile-plate-avatar"
                alt="Profile photo"
                data-profile-photo
                src="https://www.figma.com/api/mcp/asset/a2c1075d-6915-4401-a952-4c5dcfec623a"
              />
            </div>

            <div class="profile-plate-content">
              <div class="sheet sheet-profile" aria-label="Profile details">
                <div class="sheet-head">
                  <h1 class="page-title">Your Plate</h1>
                  <button class="profile-edit-btn" type="button" data-action="profile-edit">Edit</button>
                </div>
                <div class="profile-row">
                  <div class="profile-label">Name</div>
                  <div class="profile-value" data-profile-name>Anonymous</div>
                </div>
                <div class="profile-row">
                  <div class="profile-label">Location</div>
                  <div class="profile-value" data-profile-location>Knoxville</div>
                </div>
                <div class="profile-row">
                  <div class="profile-label">Account</div>
                  <div class="profile-value" data-profile-email>Not signed in</div>
                </div>

                <div class="profile-auth">
                  <div id="google-signin-btn" class="google-signin-btn" aria-label="Sign in with Google"></div>
                  <button class="google-signout-btn" type="button" data-action="google-signout">Sign out</button>
                  <div class="profile-auth-note">
                    Google sign-in is used to fill your profile. (Prototype: stored on this device.)
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="profile-drawer-peek" data-profile-handle>
            <div class="profile-drawer-handle" aria-hidden="true"></div>
          </div>
        </section>

        <section class="content map-canvas" aria-label="Map canvas">
          <div class="map-page map-page--full">
            <div class="map-topbar" role="region" aria-label="Map search">
              <form id="map-search-form" class="map-search-form" role="search" aria-label="Search Knoxville address">
                <input
                  id="map-search-input"
                  name="q"
                  type="search"
                  enterkeyhint="search"
                  placeholder="Search address in Knoxville…"
                  autocomplete="street-address"
                />
                <button type="submit" class="map-search-submit">Search</button>
                <button type="button" id="map-locate-btn" class="map-locate-btn">My location</button>
              </form>
              <div id="map-status" class="map-status" role="status" aria-live="polite" hidden></div>
            </div>

            <div id="map" class="map-gl map-gl--full" role="region" aria-label="Knoxville map"></div>

            <div class="map-sheet-backdrop" data-map-sheet-backdrop hidden></div>
            <section
              class="map-sheet"
              data-map-sheet
              role="dialog"
              aria-label="Location details"
              aria-hidden="true"
              tabindex="-1"
            >
              <div class="map-sheet__handle" aria-hidden="true"></div>
              <div class="map-sheet__head">
                <div class="map-sheet__title-wrap">
                  <h2 class="map-sheet__title" data-map-sheet-title>Location</h2>
                  <div class="map-sheet__meta" data-map-sheet-meta></div>
                </div>
                <button class="icon-btn map-sheet__close" type="button" data-map-sheet-close aria-label="Close details">
                  <span class="icon icon-x" aria-hidden="true"></span>
                </button>
              </div>

              <div class="map-sheet__body">
                <div class="map-sheet__row">
                  <div class="map-sheet__label">Address</div>
                  <div class="map-sheet__value" data-map-sheet-address>—</div>
                </div>
                <div class="map-sheet__row">
                  <div class="map-sheet__label">Hours</div>
                  <div class="map-sheet__value" data-map-sheet-hours>—</div>
                </div>

                <div class="map-sheet__actions" aria-label="Actions">
                  <button type="button" class="map-sheet__primary" data-map-sheet-directions>Get directions</button>
                  <button type="button" class="map-sheet__secondary" data-map-sheet-notify>Notify me</button>
                </div>

                <div class="map-route-panel map-route-panel--sheet" aria-label="Route">
                  <div id="map-route-summary" class="map-route-summary"></div>
                  <button type="button" id="map-route-clear" class="map-route-clear" hidden>Clear route</button>
                  <ol id="map-route-steps" class="map-route-steps"></ol>
                </div>
              </div>
            </section>
          </div>
        </section>
      </div>
    </main>

    <nav class="puf-float-nav" aria-label="Primary navigation">
      <a class="is-active" href="homepage.html" aria-current="page" aria-label="Nearby">
        <span class="nav-icon nav-icon--nearby" aria-hidden="true"></span>
      </a>
      <a href="snap.html" aria-label="SNAP">
        <span class="nav-icon nav-icon--snap" aria-hidden="true"></span>
      </a>
      <a href="support.html" aria-label="Support">
        <span class="nav-icon nav-icon--support" aria-hidden="true"></span>
      </a>
      <a href="mailbox.html" aria-label="Mailbox">
        <span class="nav-icon nav-icon--mailbox" aria-hidden="true"></span>
      </a>
    </nav>

    <dialog class="modal" data-modal-root="menu" aria-label="Menu">
      <form method="dialog" class="modal-backdrop">
        <div class="modal-sheet" role="document">
          <div class="modal-head">
            <div class="modal-title">Menu</div>
            <button class="icon-btn" value="cancel" aria-label="Close">
              <span class="icon icon-x" aria-hidden="true"></span>
            </button>
          </div>
          <nav class="modal-nav" aria-label="Menu links">
            <a href="homepage.html">Home</a>
            <a href="map.html">Map</a>
            <a href="mailbox.html">Mailbox</a>
            <a href="snap.html">SNAP</a>
            <a href="support.html">Support</a>
            <a href="emergency.html">Emergency</a>
            <a href="profile.html">Profile</a>
          </nav>
        </div>
      </form>
    </dialog>

    <script>
      window.MAPBOX_ACCESS_TOKEN = window.MAPBOX_ACCESS_TOKEN || "";
    </script>
    <script src="./map-config.js"></script>
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.7.0/mapbox-gl.js"></script>
    <script defer src="./script.js"></script>
    <script defer src="./profile-drawer.js"></script>
    <script defer src="./profile-image.js"></script>
    <script defer src="./google-auth.js"></script>
    <script defer src="./map.js"></script>
  </body>
</html>
