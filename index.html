<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Your Plate</title>
    <meta name="description" content="Public Food Utility - welcome" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="icon" href="./favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <link rel="manifest" href="./site.webmanifest" />
    <meta name="theme-color" content="#d9edee" />
    <script defer src="./script.js"></script>
    <script defer src="./supabase-config.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="./supabase-auth.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <style>
      :root {
        --gingham-base: var(--puf-gingham-base);
        --gingham-stripe: var(--puf-gingham-blue);
        --gingham-stripe-2: var(--puf-gingham-cream);
        --ink: #5a3a2c;
        --cta-bg: var(--color-accent);
        --cta-ink: var(--color-on-accent);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        overflow: hidden;
        background: var(--color-accent);
        -webkit-tap-highlight-color: transparent;
      }

      .phone.splash-phone {
        background: var(--gingham-base);
      }

      .splash-shell {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }

      .gingham {
        position: absolute;
        inset: 0;
        z-index: 0;
        background-color: var(--gingham-base);
        background-image:
          linear-gradient(
            90deg,
            var(--gingham-stripe) 0,
            var(--gingham-stripe) 25%,
            var(--gingham-stripe-2) 25%,
            var(--gingham-stripe-2) 50%,
            var(--gingham-stripe) 50%,
            var(--gingham-stripe) 75%,
            var(--gingham-stripe-2) 75%,
            var(--gingham-stripe-2) 100%
          ),
          linear-gradient(
            0deg,
            var(--gingham-stripe) 0,
            var(--gingham-stripe) 25%,
            var(--gingham-stripe-2) 25%,
            var(--gingham-stripe-2) 50%,
            var(--gingham-stripe) 50%,
            var(--gingham-stripe) 75%,
            var(--gingham-stripe-2) 75%,
            var(--gingham-stripe-2) 100%
          );
        background-size: 34px 34px;
        background-blend-mode: multiply;
        filter: url(#fabricDistort);
      }

      .splash-ui {
        position: absolute;
        inset: 0;
        z-index: 2;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        padding: 22px 20px calc(18px + env(safe-area-inset-bottom, 0px));
        pointer-events: none;
      }

      .topline,
      .cta-wrap {
        pointer-events: auto;
      }

      .topline {
        text-align: center;
        max-width: 22rem;
        color: var(--ink);
      }

      .topline h1 {
        margin: 0 0 6px;
        font-size: 30px;
        font-weight: 700;
        line-height: 1.2;
        letter-spacing: -0.02em;
        font-family: "Capriola", var(--font-body);
        position: absolute;
        left: 125px;
        top: 39px;
        text-align: center;
      }

      .topline p {
        margin: 0;
        font-size: 16px;
        color: rgba(58, 42, 44, 0.78);
        position: absolute;
        left: 112px;
        top: 72px;
        text-align: center;
        width: 175px;
      }

      .cta-wrap {
        width: 100%;
        max-width: 22rem;
        padding-top: 8px;
      }

      .cta {
        display: flex;
        align-items: center;
        justify-content: center;
        position: absolute;
        left: 14px;
        right: 14px;
        bottom: calc(18px + env(safe-area-inset-bottom, 0px));
        width: auto;
        min-height: 52px;
        padding: 14px 22px;
        border: none;
        border-radius: 999px;
        background: var(--cta-bg);
        color: var(--cta-ink);
        font-family: var(--font-body);
        font-size: 1.05rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        text-decoration: none;
        text-align: center;
        box-shadow: 0 4px 0 rgba(60, 30, 35, 0.18), 0 10px 24px rgba(60, 30, 35, 0.12);
        transition: transform 0.12s ease, box-shadow 0.12s ease;
      }

      .cta:hover {
        filter: brightness(1.04);
      }

      .cta:active {
        transform: translateY(2px);
        box-shadow: 0 2px 0 rgba(60, 30, 35, 0.16), 0 6px 14px rgba(60, 30, 35, 0.1);
      }

      .svg-filters {
        position: absolute;
        width: 0;
        height: 0;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <svg class="svg-filters" aria-hidden="true" focusable="false">
      <defs>
        <filter id="fabricDistort" x="-5%" y="-5%" width="110%" height="110%" color-interpolation-filters="sRGB">
          <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="17" result="noise" />
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="G" />
        </filter>
      </defs>
    </svg>

    <main class="screen" data-screen="splash">
      <div class="phone splash-phone" role="application" aria-label="Splash">
        <div class="splash-shell">
          <div class="gingham" aria-hidden="true"></div>
          <div class="splash-ui">
            <header class="topline">
              <p>Good food just around the corner!</p>
              <h1>Your Plate</h1>
            </header>

            <footer class="cta-wrap">
              <button class="cta" id="ctaEat" type="button" data-modal="splash-auth">Let's Eat</button>
            </footer>
          </div>
        </div>
      </div>
    </main>

    <dialog class="modal" data-modal-root="splash-auth" aria-label="Sign in">
      <form method="dialog" class="modal-backdrop modal-backdrop--center">
        <div class="modal-sheet" role="document" aria-label="Sign in to continue">
          <div class="modal-head">
            <div class="modal-title">Sign in</div>
            <button class="icon-btn" value="cancel" aria-label="Close">
              <span class="icon icon-x" aria-hidden="true"></span>
            </button>
          </div>

          <div style="padding: 14px">
            <div class="profile-auth" data-supabase-auth hidden>
              <div data-supabase-signed-out>
                <div class="puf-auth-form" aria-label="Email sign in">
                  <button type="button" class="puf-auth-btn" data-supabase-google>Continue with Google</button>
                  <input id="supabase-email" class="puf-auth-input" type="email" placeholder="Email" autocomplete="email" />
                  <input
                    id="supabase-password"
                    class="puf-auth-input"
                    type="password"
                    placeholder="Password"
                    autocomplete="current-password"
                  />
                  <div class="puf-auth-actions">
                    <button type="button" class="puf-auth-btn" data-supabase-signin>Sign in</button>
                    <button type="button" class="puf-auth-btn puf-auth-btn--soft" data-supabase-signup>Sign up</button>
                  </div>
                  <div class="profile-auth-note" data-supabase-status hidden></div>
                </div>
              </div>

              <div data-supabase-signed-in hidden>
                <div class="profile-auth-note">You're signed in. Continue to the app.</div>
                <a class="puf-auth-btn" href="homepage.html" style="display:grid;place-items:center;text-decoration:none">
                  Continue
                </a>
                <button type="button" class="puf-auth-btn puf-auth-btn--soft" data-supabase-signout>Sign out</button>
              </div>
            </div>
          </div>
        </div>
      </form>
    </dialog>

    <script type="module">
      import * as THREE from 'three';
      import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

      const canvasFrame = {
        left: 195,
        top: 81,
        width: 377,
        height: 742,
      };
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(45, canvasFrame.width / canvasFrame.height, 0.1, 100);
      camera.position.set(0, 2, 5);
      camera.lookAt(0, 0, 0);

      const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(canvasFrame.width, canvasFrame.height);
      renderer.shadowMap.enabled = true;
      renderer.domElement.style.position = 'absolute';
      renderer.domElement.style.top = '81px';
      renderer.domElement.style.left = '195px';
      renderer.domElement.style.transform = 'translateX(-50%)';
      renderer.domElement.style.width = canvasFrame.width + 'px';
      renderer.domElement.style.height = canvasFrame.height + 'px';
      renderer.domElement.style.zIndex = '1';
      renderer.domElement.style.pointerEvents = 'auto';
      const canvasMount = document.querySelector('.splash-shell') ?? document.body;
      canvasMount.appendChild(renderer.domElement);
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          renderer.domElement.style.top = '81px';
        });
      });

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enabled = false;
      controls.enableDamping = true;

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambientLight);

      const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
      directionalLight.position.set(5, 10, 7);
      directionalLight.castShadow = true;
      directionalLight.shadow.mapSize.set(1024, 1024);
      scene.add(directionalLight);

      const fillLight = new THREE.DirectionalLight(0xfff3dc, 0.45);
      fillLight.position.set(-4, 3, 2);
      scene.add(fillLight);

      // Removed “table” shadow receiver: with a flat PNG plane, shadows read as a hard rectangle.

      const raycaster = new THREE.Raycaster();
      const pointer = new THREE.Vector2();
      // Drag on a screen-facing plane so movement is left/right + up/down.
      const dragPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
      const planeHit = new THREE.Vector3();
      const dragOffset = new THREE.Vector3();
      const lastPointerPoint = new THREE.Vector3();
      const dragVelocity = new THREE.Vector3();
      const momentum = new THREE.Vector3();

      let plate = null;
      let plateLiftRig = null;
      let isDragging = false;
      let plateTarget = new THREE.Vector3(0, 0, 0);
      let basePlateY = 0;
      let tiltX = 0;
      let tiltZ = 0;
      let rotationY = 0;
      let setLiftAngle = THREE.MathUtils.degToRad(48);
      let fittedCameraLookAt = new THREE.Vector3(0, 0, 0);
      let entranceStartMs = null;
      let entranceDone = false;
      const plateForwardOffset = 0.28;
      const plateScreenZ = 0.6;
      let plateBaseScale = 1;

      // Tilt the splash plate up (hinged at the bottom edge).
      const plateLiftTilt = THREE.MathUtils.degToRad(45);
      const plateBaseRotation = new THREE.Euler(-Math.PI / 2 + plateLiftTilt, 0, 0);
      const modelSources = {
        plate: {
          label: 'Plate',
          position: new THREE.Vector3(0, 0, 0),
          size: 2.1,
        },
      };

      function applyShadowSettings(root) {
        root.traverse((child) => {
          if (!child.isMesh) return;
          child.castShadow = true;
          child.receiveShadow = true;
          if (child.material) {
            child.material.needsUpdate = true;
          }
        });
      }

      function normalizeModel(root, targetSize) {
        const box = new THREE.Box3().setFromObject(root);
        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        box.getSize(size);
        box.getCenter(center);

        const largestDimension = Math.max(size.x, size.y, size.z) || 1;
        const scale = targetSize / largestDimension;
        root.scale.setScalar(scale);

        const scaledBox = new THREE.Box3().setFromObject(root);
        const scaledCenter = new THREE.Vector3();
        scaledBox.getCenter(scaledCenter);

        root.position.x -= scaledCenter.x;
        root.position.z -= scaledCenter.z;
        root.position.y -= scaledBox.min.y;
      }

      function finalizeModel(root, config, baseRotation) {
        applyShadowSettings(root);
        normalizeModel(root, config.size);
        root.position.copy(config.position);
        root.rotation.copy(baseRotation);
        scene.add(root);
      }

      function buildSetLiftRig(root, config) {
        applyShadowSettings(root);
        normalizeModel(root, config.size);

        const box = new THREE.Box3().setFromObject(root);
        const hingeY = box.min.y;
        const hingeZ = box.max.z;
        const liftWrapper = new THREE.Group();

        root.position.y -= hingeY;
        root.position.z -= hingeZ;
        liftWrapper.add(root);
        liftWrapper.rotation.x = setLiftAngle;

        const rig = new THREE.Group();
        rig.add(liftWrapper);
        rig.position.copy(config.position);
        rig.rotation.copy(plateBaseRotation);
        scene.add(rig);

        return { rig, liftWrapper };
      }

      function fitCameraToObject(object3D, padding = 1.18) {
        const box = new THREE.Box3().setFromObject(object3D);
        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        box.getSize(size);
        box.getCenter(center);

        const halfFovY = THREE.MathUtils.degToRad(camera.fov * 0.5);
        const halfFovX = Math.atan(Math.tan(halfFovY) * camera.aspect);
        const distanceForHeight = (size.y * 0.5 * padding) / Math.tan(halfFovY);
        const distanceForWidth = (size.x * 0.5 * padding) / Math.tan(halfFovX);
        const distance = Math.max(distanceForHeight, distanceForWidth, 5.5) * 1.08;

        // Center the model in the canvas.
        fittedCameraLookAt.copy(center);
        camera.position.set(center.x, center.y + Math.max(1.2, size.y * 1.05), center.z + distance);
        camera.near = 0.1;
        camera.far = Math.max(100, distance * 8);
        camera.updateProjectionMatrix();
        camera.lookAt(fittedCameraLookAt);
      }

      function createPlatePngMesh(config) {
        return new Promise((resolve, reject) => {
          const textureLoader = new THREE.TextureLoader();
          textureLoader.load(
            './assets/Plate.png',
            (tex) => {
              tex.colorSpace = THREE.SRGBColorSpace;
              tex.anisotropy = Math.max(1, Math.min(8, renderer.capabilities.getMaxAnisotropy?.() ?? 8));

              // PlaneGeometry is centered by default; translate so the bottom edge is at the origin.
              // This makes rotations feel like the bottom (closest) edge is anchored.
              const geo = new THREE.PlaneGeometry(2, 2, 1, 1);
              geo.translate(0, 1, 0);
              const mat = new THREE.MeshStandardMaterial({
                map: tex,
                transparent: true,
                opacity: 1,
                roughness: 0.75,
                metalness: 0.0,
              });
              const mesh = new THREE.Mesh(geo, mat);
              // Avoid rectangular plane shadow artifacts.
              mesh.castShadow = false;
              mesh.receiveShadow = false;

              // Match the old plate config feel.
              mesh.position.copy(config.position);
              mesh.rotation.copy(plateBaseRotation);
              plateBaseScale = config.size / 2;
              mesh.scale.setScalar(plateBaseScale);
              scene.add(mesh);
              resolve(mesh);
            },
            undefined,
            () => reject(new Error('Failed to load Plate.png')),
          );
        });
      }

      createPlatePngMesh(modelSources.plate)
        .then((mesh) => {
          plate = mesh;
          // Keep the plate on a fixed screen-facing depth.
          plate.position.z = plateScreenZ;
          plateTarget.copy(plate.position);
          lastPointerPoint.copy(plate.position);
          basePlateY = plate.position.y;
          // Extra padding so the plate doesn’t clip while spinning in.
          fitCameraToObject(plate, 1.32);
          entranceStartMs = performance.now();
          entranceDone = false;
        })
        .catch((err) => {
          console.error(err);
        });

      function inInteractionBox(event) {
        // Constrain interaction to the “red box” region (big middle area).
        // Tuned for the current splash layout.
        const rect = renderer.domElement.getBoundingClientRect();
        const x = event.clientX - rect.left;
        const y = event.clientY - rect.top;
        const padX = 18;
        const topPad = 110;
        const bottomPad = 110;
        return x >= padX && x <= rect.width - padX && y >= topPad && y <= rect.height - bottomPad;
      }

      function updatePointer(event) {
        const rect = renderer.domElement.getBoundingClientRect();
        pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      }

      function getPlaneIntersection(event, target) {
        updatePointer(event);
        raycaster.setFromCamera(pointer, camera);
        dragPlane.constant = -plateScreenZ;
        return raycaster.ray.intersectPlane(dragPlane, target);
      }

      function getWorldBounds() {
        const distance = Math.max(0.001, Math.abs(camera.position.z - plateScreenZ));
        const viewHeight = 2 * Math.tan(THREE.MathUtils.degToRad(camera.fov * 0.5)) * distance;
        const viewWidth = viewHeight * camera.aspect;

        return {
          minX: -viewWidth * 0.36,
          maxX: viewWidth * 0.36,
          // Allow dragging further down, but keep above the button area.
          minY: -viewHeight * 0.34,
          maxY: viewHeight * 0.22,
        };
      }

      renderer.domElement.addEventListener('pointerdown', (event) => {
        if (!plate) return;
        if (!inInteractionBox(event)) return;

        updatePointer(event);
        raycaster.setFromCamera(pointer, camera);
        const hits = raycaster.intersectObject(plate, true);

        if (!hits.length) return;
        if (!getPlaneIntersection(event, planeHit)) return;

        isDragging = true;
        momentum.set(0, 0, 0);
        dragVelocity.set(0, 0, 0);
        dragOffset.copy(planeHit).sub(plate.position);
        lastPointerPoint.copy(plate.position);
        renderer.domElement.setPointerCapture(event.pointerId);
      });

      renderer.domElement.addEventListener('pointermove', (event) => {
        if (!isDragging || !plate) return;
        if (!inInteractionBox(event)) return;
        if (!getPlaneIntersection(event, planeHit)) return;

        plateTarget.set(planeHit.x - dragOffset.x, planeHit.y - dragOffset.y, plateScreenZ);
        const bounds = getWorldBounds();
        plateTarget.x = THREE.MathUtils.clamp(plateTarget.x, bounds.minX, bounds.maxX);
        plateTarget.y = THREE.MathUtils.clamp(plateTarget.y, bounds.minY, bounds.maxY);

        dragVelocity.copy(plateTarget).sub(lastPointerPoint);
        lastPointerPoint.copy(plateTarget);
      });

      function releasePlate(pointerId) {
        if (!plate || !isDragging) return;

        isDragging = false;
        momentum.copy(dragVelocity);

        try {
          renderer.domElement.releasePointerCapture(pointerId);
        } catch (_) {}
      }

      renderer.domElement.addEventListener('pointerup', (event) => {
        releasePlate(event.pointerId);
      });

      renderer.domElement.addEventListener('pointercancel', (event) => {
        releasePlate(event.pointerId);
      });

      window.addEventListener('resize', () => {
        camera.aspect = canvasFrame.width / canvasFrame.height;
        camera.updateProjectionMatrix();
        renderer.setSize(canvasFrame.width, canvasFrame.height);
        if (plate) fitCameraToObject(plate, 1.14);
      });

      function animate() {
        requestAnimationFrame(animate);
        const now = Date.now() * 0.001;

        if (plate) {
          const bounds = getWorldBounds();
          const entranceT =
            entranceDone || entranceStartMs === null
              ? 1
              : THREE.MathUtils.clamp((performance.now() - entranceStartMs) / 1100, 0, 1);
          entranceDone = entranceT >= 1;
          const ease = 1 - Math.pow(1 - entranceT, 3);
          const centerX = 0;
          const centerY = (bounds.minY + bounds.maxY) * 0.5;
          // Start from the upper “arrow” area (just below the title),
          // not from far off-screen.
          const slideStartY = bounds.maxY + 0.35;
          const slideInY = THREE.MathUtils.lerp(slideStartY, centerY, ease);
          const spinIn = THREE.MathUtils.lerp(Math.PI * 2.1, 0, ease);
          const entranceScale = THREE.MathUtils.lerp(0.9, 1.0, ease);

          if (isDragging) {
            plate.position.lerp(plateTarget, 0.15);
            tiltZ = THREE.MathUtils.lerp(
              tiltZ,
              THREE.MathUtils.clamp(-dragVelocity.x * 3.2, THREE.MathUtils.degToRad(-12), THREE.MathUtils.degToRad(12)),
              0.18,
            );
            tiltX = THREE.MathUtils.lerp(
              tiltX,
              THREE.MathUtils.clamp(dragVelocity.y * 3.1, THREE.MathUtils.degToRad(-12), THREE.MathUtils.degToRad(12)),
              0.18,
            );
            rotationY = THREE.MathUtils.lerp(rotationY, 0, 0.18);
          } else {
            plate.position.x += momentum.x;
            plate.position.y += momentum.y;
            momentum.multiplyScalar(0.88);

            if (plate.position.x < bounds.minX || plate.position.x > bounds.maxX) {
              plate.position.x = THREE.MathUtils.clamp(plate.position.x, bounds.minX, bounds.maxX);
              momentum.x *= -0.76;
            }

            if (plate.position.y < bounds.minY || plate.position.y > bounds.maxY) {
              plate.position.y = THREE.MathUtils.clamp(plate.position.y, bounds.minY, bounds.maxY);
              momentum.y *= -0.76;
            }

            // Gentle idle wobble (keep it subtle).
            rotationY = Math.sin(now * (Math.PI * 2 / 3)) * THREE.MathUtils.degToRad(1.2);
            tiltX = THREE.MathUtils.lerp(tiltX, 0, 0.08);
            tiltZ = THREE.MathUtils.lerp(tiltZ, 0, 0.08);
          }

          if (!entranceDone) {
            // Always come from center-top, spinning down, then settle in the middle.
            plate.position.x = centerX;
            plate.position.y = isDragging ? plate.position.y : slideInY;
            plate.position.z = plateScreenZ;
            plate.scale.setScalar(plateBaseScale * entranceScale);
          } else {
            plate.scale.setScalar(plateBaseScale);
          }

          // Hard clamp every frame so it never drifts off-screen.
          plate.position.x = THREE.MathUtils.clamp(plate.position.x, bounds.minX, bounds.maxX);
          plate.position.y = THREE.MathUtils.clamp(plate.position.y, bounds.minY, bounds.maxY);
          plate.position.z = plateScreenZ;

          if (plateLiftRig) {
            const targetLift = isDragging
              ? THREE.MathUtils.degToRad(34)
              : THREE.MathUtils.degToRad(48) + Math.sin(now * 1.2) * THREE.MathUtils.degToRad(4.5);
            setLiftAngle = THREE.MathUtils.lerp(setLiftAngle, targetLift, isDragging ? 0.15 : 0.08);
            plateLiftRig.rotation.x = setLiftAngle;
          }

          plate.rotation.x = plateBaseRotation.x + tiltX;
          plate.rotation.y = plateBaseRotation.y + rotationY;
          plate.rotation.z = plateBaseRotation.z + tiltZ + (entranceDone ? 0 : spinIn);
        }

        camera.lookAt(fittedCameraLookAt);
        controls.update();
        renderer.render(scene, camera);
      }

      animate();
    </script>
  </body>
</html>
