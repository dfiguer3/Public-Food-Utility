<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Home • Public Food Utility</title>
    <meta name="description" content="Public Food Utility — Home" />
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./script.js"></script>
    <script defer src="./theme.js"></script>
    <script defer src="./profile-drawer.js"></script>
  </head>
  <body class="app">
    <main class="screen" data-screen="home">
      <div class="phone home-frame" role="application" aria-label="Public Food Utility">
        <div class="profile-backdrop" data-profile-backdrop aria-hidden="true"></div>
        <section
          class="profile-drawer"
          data-profile-drawer
          data-peek="56"
          data-open-ratio="0.75"
          role="dialog"
          aria-label="Profile drawer"
          aria-hidden="true"
        >
          <div class="profile-drawer-peek" data-profile-handle>
            <div class="profile-drawer-handle" aria-hidden="true"></div>
            <button type="button" data-profile-peek-btn class="snap-custom-btn" aria-label="Open profile">
              Profile
            </button>
          </div>
          <div class="profile-drawer-content" aria-label="Profile content">
            <div class="profile-icon" aria-hidden="true"></div>
            <div class="sheet sheet-profile" aria-label="Profile details">
              <h1 class="page-title">Profile</h1>
              <div class="profile-row">
                <div class="profile-label">Name</div>
                <div class="profile-value">Anonymous</div>
              </div>
              <div class="profile-row">
                <div class="profile-label">Location</div>
                <div class="profile-value">Knoxville</div>
              </div>
            </div>
          </div>
        </section>

        <header class="home-header" aria-label="Header">
          <button class="home-menu" type="button" data-modal="menu" aria-label="Menu">
            <span class="home-dots" aria-hidden="true"><span aria-hidden="true"></span></span>
          </button>

          <div class="home-title" aria-label="App title">Your Plate</div>

          <a class="home-avatar" href="profile.html" aria-label="Profile">
            <img alt="" src="https://www.figma.com/api/mcp/asset/a2c1075d-6915-4401-a952-4c5dcfec623a" />
          </a>
        </header>

        <div class="home-hero-circle" aria-hidden="true"></div>

        <section class="home-sheet" aria-label="Bottom sheet">
          <div class="home-sheet-scroll" aria-label="Sheet content">
            <div class="home-section-row" aria-label="Section header">
              <h1 class="home-heading">Nearby Events</h1>
              <a class="home-map-btn" href="map.html" aria-label="Open map">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M8.6 5.2 3 3v15.8l5.6 2.2 6.8-2.2L21 21V5.2l-5.6-2.2-6.8 2.2Zm0 2.3v11.1L5 17.2V6.1l3.6 1.4Zm2 11.1V7.5l4.8-1.6v11.1l-4.8 1.6Zm6.8.6V8.1L19 6.8v11.1l-1.6 1.3Z"
                  />
                </svg>
              </a>
            </div>

            <a class="home-card" href="map.html" aria-label="Event card 1" style="top:75px">
              <button class="home-fav" type="button" data-action="toggle-fav" aria-label="Favorite event 1"></button>
            </a>
            <a class="home-card" href="map.html" aria-label="Event card 2" style="top:80px">
              <button class="home-fav" type="button" data-action="toggle-fav" aria-label="Favorite event 2"></button>
            </a>
            <a class="home-card" href="map.html" aria-label="Event card 3" style="top:200px">
              <button class="home-fav" type="button" data-action="toggle-fav" aria-label="Favorite event 3"></button>
            </a>
          </div>
        </section>
      </div>
    </main>

    <nav class="puf-float-nav" aria-label="Primary navigation">
      <a class="is-active" href="index.html" aria-current="page" aria-label="Nearby">
        <img alt="" width="49" height="49" src="https://www.figma.com/api/mcp/asset/7a7a9b4a-eeca-40ba-974c-94fa8453cfeb" />
      </a>
      <a href="snap.html" aria-label="SNAP">
        <img alt="" width="51" height="51" src="https://www.figma.com/api/mcp/asset/36b7826d-3153-4d38-9b04-decf16ce94bf" />
      </a>
      <a href="support.html" aria-label="Support">
        <img alt="" width="48" height="48" src="https://www.figma.com/api/mcp/asset/e5a0c845-af77-45b2-a9f7-accc230ea2e5" />
      </a>
      <a href="mailbox.html" aria-label="Mailbox">
        <img alt="" width="45" height="45" src="https://www.figma.com/api/mcp/asset/796b26d8-c4f9-494d-bdc5-3ff67b693229" />
      </a>
    </nav>

    <dialog class="modal" data-modal-root="menu" aria-label="Menu">
      <form method="dialog" class="modal-backdrop">
        <div class="modal-sheet" role="document">
          <div class="modal-head">
            <div class="modal-title">Menu</div>
            <button class="icon-btn" value="cancel" aria-label="Close">
              <span class="icon icon-x" aria-hidden="true"></span>
            </button>
          </div>
          <nav class="modal-nav" aria-label="Menu links">
            <a href="index.html">Home</a>
            <a href="map.html">Map</a>
            <a href="mailbox.html">Mailbox</a>
            <a href="snap.html">SNAP</a>
            <a href="support.html">Support</a>
            <a href="emergency.html">Emergency</a>
            <a href="profile.html">Profile</a>
          </nav>
        </div>
      </form>
    </dialog>
  </body>
</html>
