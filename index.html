<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Your Plate</title>
    <meta name="description" content="Public Food Utility — welcome" />
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
      :root {
        /* Match profile drawer gingham stripe family */
        --gingham-base: rgba(255, 244, 214, 0.92);
        --gingham-stripe: rgba(204, 182, 221, 0.35);
        --gingham-stripe-2: rgba(255, 244, 214, 0.35);
        --plate-size: 56px; /* bottle-cap scale */
        --plate-r: 28px;
        --cta-h: 96px;
        --ink: #3a2a2c;
        --cta-bg: #a84852;
        --cta-ink: #fffaf8;
      }

      @media (max-width: 520px) {
        :root {
          --plate-size: 44px;
          --plate-r: 22px;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        -webkit-tap-highlight-color: transparent;
      }

      .phone.splash-phone {
        background: var(--gingham-base);
      }

      .splash {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        padding: 22px 20px 18px;
        color: var(--ink);
        font-family: var(--font-body);
      }

      /* Gingham tablecloth — layered checks (seamless) */
      .gingham {
        position: absolute;
        inset: 0;
        z-index: 0;
        background-color: var(--gingham-base);
        background-image:
          linear-gradient(
            90deg,
            var(--gingham-stripe) 0,
            var(--gingham-stripe) 25%,
            var(--gingham-stripe-2) 25%,
            var(--gingham-stripe-2) 50%,
            var(--gingham-stripe) 50%,
            var(--gingham-stripe) 75%,
            var(--gingham-stripe-2) 75%,
            var(--gingham-stripe-2) 100%
          ),
          linear-gradient(
            0deg,
            var(--gingham-stripe) 0,
            var(--gingham-stripe) 25%,
            var(--gingham-stripe-2) 25%,
            var(--gingham-stripe-2) 50%,
            var(--gingham-stripe) 50%,
            var(--gingham-stripe) 75%,
            var(--gingham-stripe-2) 75%,
            var(--gingham-stripe-2) 100%
          );
        background-size: 34px 34px;
        background-blend-mode: multiply;
        filter: url(#fabricDistort);
        will-change: filter;
      }

      .topline {
        position: relative;
        z-index: 2;
        text-align: center;
        max-width: 22rem;
      }

      .topline h1 {
        margin: 0 0 6px;
        font-size: 30px;
        font-weight: 700;
        letter-spacing: -0.02em;
        line-height: 1.2;
        font-family: "Capriola", var(--font-body);
      }

      .topline p {
        margin: 0;
        font-size: 16px;
        color: rgba(58, 42, 44, 0.78);
      }

      /* Plate stage — JS sets transform */
      .plate-stage {
        position: absolute;
        left: 0;
        top: 0;
        width: 1px;
        height: 1px;
        z-index: 3;
        pointer-events: none;
      }

      .utensils {
        position: absolute;
        left: 0;
        top: 0;
        width: 1px;
        height: 1px;
        pointer-events: none;
        opacity: 0;
        transform: translate(-50%, -50%);
        transition: opacity 180ms ease;
        filter: drop-shadow(0 10px 16px rgba(40, 20, 25, 0.14));
      }

      .utensils.is-visible {
        opacity: 1;
      }

      .utensils model-viewer {
        width: 92px;
        height: 240px;
        display: block;
        pointer-events: none;
      }

      .utensils.utensils-left {
        transform: translate(-50%, -50%) rotate(-12deg);
      }

      .utensils.utensils-right {
        transform: translate(-50%, -50%) rotate(12deg);
      }

      .plate-hit {
        position: absolute;
        width: var(--plate-size);
        height: var(--plate-size);
        left: 0;
        top: 0;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        pointer-events: auto;
        touch-action: none;
        cursor: grab;
      }

      .plate-hit:active {
        cursor: grabbing;
      }

      .plate-visual {
        position: absolute;
        width: var(--plate-size);
        height: var(--plate-size);
        left: 0;
        top: 0;
        transform: translate(-50%, -50%);
        filter: drop-shadow(0 18px 22px rgba(40, 20, 25, 0.18));
        pointer-events: none;
      }

      .plate-visual model-viewer {
        width: 100%;
        height: 100%;
        display: block;
        pointer-events: none;
      }

      .cta-wrap {
        position: relative;
        z-index: 4;
        width: 100%;
        max-width: 22rem;
        padding-top: 8px;
      }

      .cta {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 52px;
        padding: 14px 22px;
        border: none;
        border-radius: 999px;
        background: var(--cta-bg);
        color: var(--cta-ink);
        font-family: var(--font-body);
        font-size: 1.05rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        text-decoration: none;
        text-align: center;
        box-shadow: 0 4px 0 rgba(60, 30, 35, 0.18), 0 10px 24px rgba(60, 30, 35, 0.12);
        transition: transform 0.12s ease, box-shadow 0.12s ease;
      }

      .cta:hover {
        filter: brightness(1.04);
      }

      .cta:active {
        transform: translateY(2px);
        box-shadow: 0 2px 0 rgba(60, 30, 35, 0.16), 0 6px 14px rgba(60, 30, 35, 0.1);
      }

      .svg-filters {
        position: absolute;
        width: 0;
        height: 0;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <svg class="svg-filters" aria-hidden="true" focusable="false">
      <defs>
        <filter id="fabricDistort" x="-5%" y="-5%" width="110%" height="110%" color-interpolation-filters="sRGB">
          <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="17" result="noise" />
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="G" />
        </filter>
      </defs>
    </svg>

    <main class="screen" data-screen="splash">
      <div class="phone splash-phone" role="application" aria-label="Splash">
        <div class="gingham" id="gingham" aria-hidden="true"></div>

        <div class="splash">
          <header class="topline">
            <h1>Your Plate</h1>
            <p>Good food, close by — let’s find your next meal.</p>
          </header>

          <div class="plate-stage" id="plateStage" aria-hidden="true">
            <div class="plate-hit" id="plateHit" role="img" aria-label="Draggable plate"></div>
            <div class="plate-visual" id="plateVisual">
              <model-viewer
                id="set3d"
                src="./assets/models/the_set.glb"
                camera-controls="false"
                interaction-prompt="none"
                environment-image="neutral"
                exposure="1"
                shadow-intensity="0.45"
                disable-zoom
                disable-pan
              ></model-viewer>
            </div>
          </div>

          <footer class="cta-wrap">
            <a class="cta" id="ctaEat" href="homepage.html">Let’s Eat</a>
          </footer>
        </div>
      </div>
    </main>

    <script>
      (function () {
        "use strict";

        const LERP = 0.1;
        const FRICTION = 0.93;
        const BOUNCE = 0.4;
        const MAX_TILT_DEG = 12;
        const ANG_SPRING = 0.22;
        const IDLE_BOB_PX = 4;
        const IDLE_ROT_DEG = 2;
        const IDLE_PERIOD_MS = 3000;

        const phone = document.querySelector(".phone.splash-phone");
        const plateStage = document.getElementById("plateStage");
        const plateHit = document.getElementById("plateHit");
        const plateVisual = document.getElementById("plateVisual");
        const dispMap = document.querySelector("#fabricDistort feDisplacementMap");

        function getStageRect() {
          const fallback = { left: 0, top: 0, width: window.innerWidth, height: window.innerHeight };
          const r = phone?.getBoundingClientRect?.();
          if (!r || !Number.isFinite(r.width) || !Number.isFinite(r.height)) return fallback;
          return r;
        }

        const r0 = getStageRect();
        let px = r0.width * 0.5;
        let py = -120; // start above, slide into center
        let tx = px;
        let ty = r0.height * 0.5;
        let vx = 0;
        let vy = 0;
        let dragging = false;
        let pid = /** @type {number | null} */ (null);
        /** @type {number | null} */
        let activePointerId = null;

        let prevPx = px;
        let prevPy = py;

        let chaseTiltDeg = 0;
        let tiltDeg = 0;
        let angVelDeg = 0;
        let intro = true;
        let introStart = performance.now();

        /** @type {number} */
        let t0 = performance.now();

        function plateRadiusPx() {
          const s = plateVisual.querySelector("svg");
          if (!s) {
            const rr = getStageRect();
            return Math.min(rr.width, rr.height) * 0.22;
          }
          const rect = s.getBoundingClientRect();
          return Math.max(rect.width, rect.height) * 0.5;
        }

        function setFabricDisplacement(speedPx, dragging_) {
          if (!dispMap) return;
          const base = dragging_ ? 12 : Math.min(6, speedPx * 0.1);
          const scale = Math.min(26, Math.max(0, base + Math.min(speedPx * 0.42, dragging_ ? 10 : 0)));
          dispMap.setAttribute("scale", scale.toFixed(2));
        }

        function clamp(v, lo, hi) {
          return Math.max(lo, Math.min(hi, v));
        }

        function placePlate() {
          plateStage.style.transform = "translate3d(" + px + "px," + py + "px,0)";
          const idleT = performance.now();
          const phase = idleT / IDLE_PERIOD_MS;
          const bob = Math.sin(phase * Math.PI * 2) * IDLE_BOB_PX;
          const idleWobble = Math.sin(phase * Math.PI * 2 * 1.07) * IDLE_ROT_DEG;
          let animBob = dragging ? 0 : bob;
          let idleRotContribution = dragging ? 0 : idleWobble;

          let speed = Math.hypot(vx, vy);

          /** @type number */
          let tiltTarget = chaseTiltDeg;
          if (dragging || speed > 0.35) {
            tiltTarget = vx * 0.14 + vy * -0.08;
          } else {
            tiltTarget = tiltDeg * FRICTION * 0.92 + chaseTiltDeg * 0.08;
          }
          tiltTarget = clamp(tiltTarget + idleRotContribution + angVelDeg * 0.12, -MAX_TILT_DEG - 4, MAX_TILT_DEG + 4);
          tiltDeg += (tiltTarget - tiltDeg) * ANG_SPRING;

          if (!dragging && speed < 0.08) {
            angVelDeg *= 0.86;
            tiltDeg += (idleWobble - tiltDeg) * 0.08;
          }

          const deg = tiltDeg + animBob * 0.15;
          plateVisual.style.transform =
            "translate(-50%,-50%) translate3d(0," + animBob.toFixed(2) + "px,0) rotate(" + deg.toFixed(3) + "deg)";
        }

        function step(now) {
          const dt = Math.min(32, now - t0);
          t0 = now;

          const r = plateRadiusPx();
          const stage = getStageRect();
          const W = stage.width;
          const H = stage.height;
          const margin = 8;
          const bottomReserve = 110;

          if (intro) {
            const elapsed = now - introStart;
            const dur = 650;
            const t = Math.min(1, elapsed / dur);
            const ease = 1 - Math.pow(1 - t, 3);
            const targetY = H * 0.5;
            const startY = -120;
            py = startY + (targetY - startY) * ease;
            px = W * 0.5;
            tx = px;
            ty = py;
            vx = vy = 0;
            chaseTiltDeg *= 0.9;
            setFabricDisplacement(0, false);
            if (t >= 1) intro = false;
            placePlate();
            pid = window.requestAnimationFrame(step);
            return;
          }

          if (dragging) {
            tx = clamp(tx, r + margin, W - r - margin);
            ty = clamp(ty, r + margin, H - r - margin - bottomReserve);
            px += (tx - px) * LERP;
            py += (ty - py) * LERP;
            const dx = px - prevPx;
            const dy = py - prevPy;
            chaseTiltDeg = clamp(dx * 0.22 + dy * -0.12, -MAX_TILT_DEG, MAX_TILT_DEG);
            prevPx = px;
            prevPy = py;
            const sp = Math.hypot(dx, dy) * (1000 / Math.max(1, dt));
            setFabricDisplacement(sp, true);
          } else {
            px += vx;
            py += vy;
            vx *= FRICTION;
            vy *= FRICTION;

            if (px < r + margin) {
              px = r + margin;
              vx = -Math.abs(vx) * BOUNCE;
            } else if (px > W - r - margin) {
              px = W - r - margin;
              vx = Math.abs(vx) * BOUNCE;
            }
            if (py < r + margin) {
              py = r + margin;
              vy = -Math.abs(vy) * BOUNCE;
            } else if (py > H - r - margin - bottomReserve) {
              py = H - r - margin - bottomReserve;
              vy = Math.abs(vy) * BOUNCE;
            }

            const sp = Math.hypot(vx, vy);
            chaseTiltDeg = clamp(vx * 0.16 + vy * -0.1, -MAX_TILT_DEG, MAX_TILT_DEG);
            if (sp > 8) angVelDeg = chaseTiltDeg * 0.05;
            else angVelDeg *= 0.9;

            setFabricDisplacement(sp, false);
          }

          placePlate();
          pid = window.requestAnimationFrame(step);
        }

        function stopLoop() {
          if (pid != null) {
            cancelAnimationFrame(pid);
            pid = null;
          }
        }

        function ensureLoop() {
          if (pid == null) {
            t0 = performance.now();
            pid = window.requestAnimationFrame(step);
          }
        }

        /** @param {PointerEvent} e */
        function onDown(e) {
          if (e.button !== undefined && e.button !== 0) return;
          if (e.target && typeof e.target.closest === "function" && e.target.closest("#ctaEat")) return;
          intro = false;
          dragging = true;
          activePointerId = e.pointerId;
          try {
            plateHit.setPointerCapture(e.pointerId);
          } catch (_) {}
          const stage = getStageRect();
          tx = e.clientX - stage.left;
          ty = e.clientY - stage.top;
          vx = vy = 0;
          prevPx = px;
          prevPy = py;
          ensureLoop();
        }

        /** @param {PointerEvent} e */
        function onMove(e) {
          if (!dragging || e.pointerId !== activePointerId) return;
          const stage = getStageRect();
          tx = e.clientX - stage.left;
          ty = e.clientY - stage.top;
        }

        /** @param {PointerEvent} e */
        function onUp(e) {
          if (!dragging || e.pointerId !== activePointerId) return;
          dragging = false;
          activePointerId = null;
          try {
            if (plateHit.hasPointerCapture && plateHit.hasPointerCapture(e.pointerId)) {
              plateHit.releasePointerCapture(e.pointerId);
            }
          } catch (_) {}
          const stage = getStageRect();
          const lx = clamp(tx, plateRadiusPx() + 8, stage.width - plateRadiusPx() - 8);
          const ly = clamp(ty, plateRadiusPx() + 8, stage.height - plateRadiusPx() - 118);
          vx = (lx - px) * 5.1;
          vy = (ly - py) * 5.1;
          vx += (tx - lx) * 0.08;
          vy += (ty - ly) * 0.08;
        }

        plateHit.addEventListener("pointerdown", onDown);
        window.addEventListener("pointermove", onMove);
        window.addEventListener("pointerup", onUp);
        window.addEventListener("pointercancel", onUp);

        window.addEventListener(
          "resize",
          () => {
            const stage = getStageRect();
            px = clamp(px, plateRadiusPx() + 8, stage.width - plateRadiusPx() - 8);
            py = clamp(py, plateRadiusPx() + 8, stage.height - plateRadiusPx() - 118);
            tx = px;
            ty = py;
          },
          { passive: true },
        );

        ensureLoop();

        window.addEventListener(
          "pagehide",
          () => {
            stopLoop();
          },
          { once: true },
        );
      })();
    </script>
  </body>
</html>
