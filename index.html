<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Your Plate</title>
    <meta name="description" content="Public Food Utility - welcome" />
    <link rel="stylesheet" href="./styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <style>
      :root {
        --gingham-base: rgba(255, 244, 214, 0.92);
        --gingham-stripe: rgba(204, 182, 221, 0.35);
        --gingham-stripe-2: rgba(255, 244, 214, 0.35);
        --ink: #3a2a2c;
        --cta-bg: #a84852;
        --cta-ink: #fffaf8;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        overflow: hidden;
        -webkit-tap-highlight-color: transparent;
      }

      .phone.splash-phone {
        background: var(--gingham-base);
      }

      .splash-shell {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }

      .gingham {
        position: absolute;
        inset: 0;
        z-index: 0;
        background-color: var(--gingham-base);
        background-image:
          linear-gradient(
            90deg,
            var(--gingham-stripe) 0,
            var(--gingham-stripe) 25%,
            var(--gingham-stripe-2) 25%,
            var(--gingham-stripe-2) 50%,
            var(--gingham-stripe) 50%,
            var(--gingham-stripe) 75%,
            var(--gingham-stripe-2) 75%,
            var(--gingham-stripe-2) 100%
          ),
          linear-gradient(
            0deg,
            var(--gingham-stripe) 0,
            var(--gingham-stripe) 25%,
            var(--gingham-stripe-2) 25%,
            var(--gingham-stripe-2) 50%,
            var(--gingham-stripe) 50%,
            var(--gingham-stripe) 75%,
            var(--gingham-stripe-2) 75%,
            var(--gingham-stripe-2) 100%
          );
        background-size: 34px 34px;
        background-blend-mode: multiply;
        filter: url(#fabricDistort);
      }

      .splash-ui {
        position: absolute;
        inset: 0;
        z-index: 2;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        padding: 22px 20px 18px;
        pointer-events: none;
      }

      .topline,
      .cta-wrap {
        pointer-events: auto;
      }

      .topline {
        text-align: center;
        max-width: 22rem;
        color: var(--ink);
      }

      .topline h1 {
        margin: 0 0 6px;
        font-size: 30px;
        font-weight: 700;
        line-height: 1.2;
        letter-spacing: -0.02em;
        font-family: "Capriola", var(--font-body);
      }

      .topline p {
        margin: 0;
        font-size: 16px;
        color: rgba(58, 42, 44, 0.78);
      }

      .cta-wrap {
        width: 100%;
        max-width: 22rem;
        padding-top: 8px;
      }

      .cta {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 52px;
        padding: 14px 22px;
        border: none;
        border-radius: 999px;
        background: var(--cta-bg);
        color: var(--cta-ink);
        font-family: var(--font-body);
        font-size: 1.05rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        text-decoration: none;
        text-align: center;
        box-shadow: 0 4px 0 rgba(60, 30, 35, 0.18), 0 10px 24px rgba(60, 30, 35, 0.12);
        transition: transform 0.12s ease, box-shadow 0.12s ease;
      }

      .cta:hover {
        filter: brightness(1.04);
      }

      .cta:active {
        transform: translateY(2px);
        box-shadow: 0 2px 0 rgba(60, 30, 35, 0.16), 0 6px 14px rgba(60, 30, 35, 0.1);
      }

      .svg-filters {
        position: absolute;
        width: 0;
        height: 0;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <svg class="svg-filters" aria-hidden="true" focusable="false">
      <defs>
        <filter id="fabricDistort" x="-5%" y="-5%" width="110%" height="110%" color-interpolation-filters="sRGB">
          <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="17" result="noise" />
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="G" />
        </filter>
      </defs>
    </svg>

    <main class="screen" data-screen="splash">
      <div class="phone splash-phone" role="application" aria-label="Splash">
        <div class="splash-shell">
          <div class="gingham" aria-hidden="true"></div>
          <div class="splash-ui">
            <header class="topline">
              <h1>Your Plate</h1>
              <p>Good food, close by - let's find your next meal.</p>
            </header>

            <footer class="cta-wrap">
              <a class="cta" id="ctaEat" href="homepage.html">Let's Eat</a>
            </footer>
          </div>
        </div>
      </div>
    </main>

    <script type="module">
      import * as THREE from 'three';
      import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
      import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
      import { plateGlbBase64, forkGlbBase64, spoonGlbBase64 } from './splash-model-data.js';

      const canvasFrame = {
        left: 134,
        top: 0,
        width: 377,
        height: 742,
      };
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(45, canvasFrame.width / canvasFrame.height, 0.1, 100);
      camera.position.set(0, 2, 5);
      camera.lookAt(0, 0, 0);

      const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(canvasFrame.width, canvasFrame.height);
      renderer.shadowMap.enabled = true;
      renderer.domElement.style.position = 'absolute';
      renderer.domElement.style.top = '0px';
      renderer.domElement.style.left = '50%';
      renderer.domElement.style.transform = 'translateX(-50%)';
      renderer.domElement.style.width = canvasFrame.width + 'px';
      renderer.domElement.style.height = canvasFrame.height + 'px';
      renderer.domElement.style.zIndex = '1';
      renderer.domElement.style.pointerEvents = 'auto';
      const canvasMount = document.querySelector('.splash-shell') ?? document.body;
      canvasMount.appendChild(renderer.domElement);
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          renderer.domElement.style.top = canvasFrame.top + 'px';
        });
      });

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enabled = false;
      controls.enableDamping = true;

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambientLight);

      const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
      directionalLight.position.set(5, 10, 7);
      directionalLight.castShadow = true;
      directionalLight.shadow.mapSize.set(1024, 1024);
      scene.add(directionalLight);

      const fillLight = new THREE.DirectionalLight(0xfff3dc, 0.45);
      fillLight.position.set(-4, 3, 2);
      scene.add(fillLight);

      const tableShadow = new THREE.Mesh(
        new THREE.CircleGeometry(4.2, 64),
        new THREE.ShadowMaterial({ color: 0x000000, opacity: 0.12 }),
      );
      tableShadow.rotation.x = -Math.PI / 2;
      tableShadow.position.y = -0.01;
      tableShadow.receiveShadow = true;
      scene.add(tableShadow);

      const loader = new GLTFLoader();
      const raycaster = new THREE.Raycaster();
      const pointer = new THREE.Vector2();
      const dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
      const planeHit = new THREE.Vector3();
      const dragOffset = new THREE.Vector3();
      const lastPointerPoint = new THREE.Vector3();
      const dragVelocity = new THREE.Vector3();
      const momentum = new THREE.Vector3();

      let plate = null;
      let fork = null;
      let spoon = null;
      let plateLiftRig = null;
      let isDragging = false;
      let plateTarget = new THREE.Vector3(0, 0, 0);
      let basePlateY = 0;
      let tiltX = 0;
      let tiltZ = 0;
      let rotationY = 0;
      let setLiftAngle = THREE.MathUtils.degToRad(48);
      let fittedCameraLookAt = new THREE.Vector3(0, 0, 0);
      let entranceStartMs = null;
      let entranceDone = false;
      const plateForwardOffset = 0.28;

      const plateBaseRotation = new THREE.Euler(-Math.PI / 2, 0, 0);
      const utensilBaseRotation = new THREE.Euler(-Math.PI / 2, 0, Math.PI);
      const modelSources = {
        set: {
          path: './assets/models/the_set.glb',
          label: 'Set',
          position: new THREE.Vector3(0, 0, 0),
          size: 2.57,
        },
        plate: {
          path: './assets/models/plate.glb',
          base64: plateGlbBase64,
          label: 'Plate',
          position: new THREE.Vector3(0, 0, 0),
          size: 2.1,
        },
        fork: {
          path: './assets/models/fork.glb',
          base64: forkGlbBase64,
          label: 'Fork',
          position: new THREE.Vector3(-1.5, 0, 0),
          size: 2.2,
        },
        spoon: {
          path: './assets/models/spoon.glb',
          base64: spoonGlbBase64,
          label: 'Spoon',
          position: new THREE.Vector3(1.5, 0, 0),
          size: 2.2,
        },
      };

      function decodeBase64ToArrayBuffer(base64) {
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let index = 0; index < binary.length; index += 1) {
          bytes[index] = binary.charCodeAt(index);
        }
        return bytes.buffer;
      }

      function applyShadowSettings(root) {
        root.traverse((child) => {
          if (!child.isMesh) return;
          child.castShadow = true;
          child.receiveShadow = true;
          if (child.material) {
            child.material.needsUpdate = true;
          }
        });
      }

      function normalizeModel(root, targetSize) {
        const box = new THREE.Box3().setFromObject(root);
        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        box.getSize(size);
        box.getCenter(center);

        const largestDimension = Math.max(size.x, size.y, size.z) || 1;
        const scale = targetSize / largestDimension;
        root.scale.setScalar(scale);

        const scaledBox = new THREE.Box3().setFromObject(root);
        const scaledCenter = new THREE.Vector3();
        scaledBox.getCenter(scaledCenter);

        root.position.x -= scaledCenter.x;
        root.position.z -= scaledCenter.z;
        root.position.y -= scaledBox.min.y;
      }

      function finalizeModel(root, config, baseRotation) {
        applyShadowSettings(root);
        normalizeModel(root, config.size);
        root.position.copy(config.position);
        root.rotation.copy(baseRotation);
        scene.add(root);
      }

      function buildSetLiftRig(root, config) {
        applyShadowSettings(root);
        normalizeModel(root, config.size);

        const box = new THREE.Box3().setFromObject(root);
        const hingeY = box.min.y;
        const hingeZ = box.max.z;
        const liftWrapper = new THREE.Group();

        root.position.y -= hingeY;
        root.position.z -= hingeZ;
        liftWrapper.add(root);
        liftWrapper.rotation.x = setLiftAngle;

        const rig = new THREE.Group();
        rig.add(liftWrapper);
        rig.position.copy(config.position);
        rig.rotation.copy(plateBaseRotation);
        scene.add(rig);

        return { rig, liftWrapper };
      }

      function fitCameraToObject(object3D, padding = 1.18) {
        const box = new THREE.Box3().setFromObject(object3D);
        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        box.getSize(size);
        box.getCenter(center);

        const halfFovY = THREE.MathUtils.degToRad(camera.fov * 0.5);
        const halfFovX = Math.atan(Math.tan(halfFovY) * camera.aspect);
        const distanceForHeight = (size.y * 0.5 * padding) / Math.tan(halfFovY);
        const distanceForWidth = (size.x * 0.5 * padding) / Math.tan(halfFovX);
        const distance = Math.max(distanceForHeight, distanceForWidth, 5.5) * 1.08;

        // Center the model in the canvas.
        fittedCameraLookAt.copy(center);
        camera.position.set(center.x, center.y + Math.max(1.2, size.y * 1.05), center.z + distance);
        camera.near = 0.1;
        camera.far = Math.max(100, distance * 8);
        camera.updateProjectionMatrix();
        camera.lookAt(fittedCameraLookAt);
      }

      function parseEmbeddedModel(config, onLoad) {
        loader.parse(
          decodeBase64ToArrayBuffer(config.base64),
          '',
          (gltf) => {
            console.log(config.label + ' loaded:', gltf.scene);
            onLoad(gltf.scene);
          },
          () => {},
        );
      }

      function loadModel(config, onLoad) {
        const isFileProtocol = window.location.protocol === 'file:';

        if (isFileProtocol && config.base64) {
          parseEmbeddedModel(config, onLoad);
          return;
        }

        loader.load(
          config.path,
          (gltf) => {
            console.log(config.label + ' loaded:', gltf.scene);
            onLoad(gltf.scene);
          },
          undefined,
          () => {
            if (config.base64) {
              parseEmbeddedModel(config, onLoad);
              return;
            }
            console.error('Failed to load ' + config.label + ':', config.path);
          },
        );
      }

      if (window.location.protocol === 'file:') {
        loadModel(modelSources.plate, (root) => {
          plate = root;
          finalizeModel(plate, modelSources.plate, plateBaseRotation);
          plate.position.z += plateForwardOffset;
          plateTarget.copy(plate.position);
          lastPointerPoint.copy(plate.position);
          basePlateY = plate.position.y;
          fitCameraToObject(plate, 1.14);
          entranceStartMs = performance.now();
          entranceDone = false;
        });

        loadModel(modelSources.fork, (root) => {
          fork = root;
          finalizeModel(fork, modelSources.fork, utensilBaseRotation);
        });

        loadModel(modelSources.spoon, (root) => {
          spoon = root;
          finalizeModel(spoon, modelSources.spoon, utensilBaseRotation);
        });
      } else {
        loadModel(modelSources.set, (root) => {
          const setModel = root;
          const namedNodes = [];

          setModel.traverse((child) => {
            if (child.name) {
              namedNodes.push(child.name.toLowerCase());
            }
          });

          const setRig = buildSetLiftRig(setModel, modelSources.set);
          plate = setRig.rig;
          plateLiftRig = setRig.liftWrapper;
          plate.position.z += plateForwardOffset;
          plateTarget.copy(plate.position);
          lastPointerPoint.copy(plate.position);
          basePlateY = plate.position.y;
          fitCameraToObject(plate, 1.14);
          entranceStartMs = performance.now();
          entranceDone = false;

          console.log('Set node names:', namedNodes);
        });
      }

      function updatePointer(event) {
        const rect = renderer.domElement.getBoundingClientRect();
        pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      }

      function getPlaneIntersection(event, target) {
        updatePointer(event);
        raycaster.setFromCamera(pointer, camera);
        return raycaster.ray.intersectPlane(dragPlane, target);
      }

      function getWorldBounds() {
        const viewHeight = 2 * Math.tan(THREE.MathUtils.degToRad(camera.fov * 0.5)) * camera.position.y;
        const viewWidth = viewHeight * camera.aspect;

        return {
          minX: -viewWidth * 0.36,
          maxX: viewWidth * 0.36,
          minZ: -2.1,
          maxZ: 1.05,
        };
      }

      renderer.domElement.addEventListener('pointerdown', (event) => {
        if (!plate) return;

        updatePointer(event);
        raycaster.setFromCamera(pointer, camera);
        const hits = raycaster.intersectObject(plate, true);

        if (!hits.length) return;
        if (!getPlaneIntersection(event, planeHit)) return;

        isDragging = true;
        momentum.set(0, 0, 0);
        dragVelocity.set(0, 0, 0);
        dragOffset.copy(planeHit).sub(plate.position);
        lastPointerPoint.copy(plate.position);
        renderer.domElement.setPointerCapture(event.pointerId);
      });

      renderer.domElement.addEventListener('pointermove', (event) => {
        if (!isDragging || !plate) return;
        if (!getPlaneIntersection(event, planeHit)) return;

        plateTarget.set(planeHit.x - dragOffset.x, basePlateY, planeHit.z - dragOffset.z);
        const bounds = getWorldBounds();
        plateTarget.x = THREE.MathUtils.clamp(plateTarget.x, bounds.minX, bounds.maxX);
        plateTarget.z = THREE.MathUtils.clamp(plateTarget.z, bounds.minZ, bounds.maxZ);

        dragVelocity.copy(plateTarget).sub(lastPointerPoint);
        lastPointerPoint.copy(plateTarget);
      });

      function releasePlate(pointerId) {
        if (!plate || !isDragging) return;

        isDragging = false;
        momentum.copy(dragVelocity);

        try {
          renderer.domElement.releasePointerCapture(pointerId);
        } catch (_) {}
      }

      renderer.domElement.addEventListener('pointerup', (event) => {
        releasePlate(event.pointerId);
      });

      renderer.domElement.addEventListener('pointercancel', (event) => {
        releasePlate(event.pointerId);
      });

      window.addEventListener('resize', () => {
        camera.aspect = canvasFrame.width / canvasFrame.height;
        camera.updateProjectionMatrix();
        renderer.setSize(canvasFrame.width, canvasFrame.height);
        if (plate) fitCameraToObject(plate, 1.14);
      });

      function animate() {
        requestAnimationFrame(animate);
        const now = Date.now() * 0.001;

        if (plate) {
          const bounds = getWorldBounds();
          const entranceT =
            entranceDone || entranceStartMs === null
              ? 1
              : THREE.MathUtils.clamp((performance.now() - entranceStartMs) / 1100, 0, 1);
          entranceDone = entranceT >= 1;
          const ease = 1 - Math.pow(1 - entranceT, 3);
          const slideInY = THREE.MathUtils.lerp(2.2, 0, ease);
          const slideInZ = THREE.MathUtils.lerp(-0.9, 0, ease);

          if (isDragging) {
            plate.position.lerp(plateTarget, 0.15);
            tiltZ = THREE.MathUtils.lerp(
              tiltZ,
              THREE.MathUtils.clamp(-dragVelocity.x * 3.2, THREE.MathUtils.degToRad(-12), THREE.MathUtils.degToRad(12)),
              0.18,
            );
            tiltX = THREE.MathUtils.lerp(
              tiltX,
              THREE.MathUtils.clamp(dragVelocity.z * 2.8, THREE.MathUtils.degToRad(-12), THREE.MathUtils.degToRad(12)),
              0.18,
            );
            rotationY = THREE.MathUtils.lerp(rotationY, 0, 0.18);
            plate.position.y = basePlateY;
          } else {
            plate.position.x += momentum.x;
            plate.position.z += momentum.z;
            momentum.multiplyScalar(0.88);

            if (plate.position.x < bounds.minX || plate.position.x > bounds.maxX) {
              plate.position.x = THREE.MathUtils.clamp(plate.position.x, bounds.minX, bounds.maxX);
              momentum.x *= -0.76;
            }

            if (plate.position.z < bounds.minZ || plate.position.z > bounds.maxZ) {
              plate.position.z = THREE.MathUtils.clamp(plate.position.z, bounds.minZ, bounds.maxZ);
              momentum.z *= -0.76;
            }

            plate.position.y = basePlateY + Math.sin(now * (Math.PI * 2 / 3)) * 0.05;
            rotationY = Math.sin(now * (Math.PI * 2 / 3)) * THREE.MathUtils.degToRad(2);
            tiltX = THREE.MathUtils.lerp(tiltX, 0, 0.08);
            tiltZ = THREE.MathUtils.lerp(tiltZ, 0, 0.08);
          }

          if (!entranceDone && !isDragging) {
            plate.position.y += slideInY;
            plate.position.z += slideInZ;
          }

          if (plateLiftRig) {
            const targetLift = isDragging
              ? THREE.MathUtils.degToRad(34)
              : THREE.MathUtils.degToRad(48) + Math.sin(now * 1.2) * THREE.MathUtils.degToRad(4.5);
            setLiftAngle = THREE.MathUtils.lerp(setLiftAngle, targetLift, isDragging ? 0.15 : 0.08);
            plateLiftRig.rotation.x = setLiftAngle;
          }

          plate.rotation.x = plateBaseRotation.x + tiltX;
          plate.rotation.y = plateBaseRotation.y + rotationY;
          plate.rotation.z = plateBaseRotation.z + tiltZ;
        }

        camera.lookAt(fittedCameraLookAt);
        controls.update();
        renderer.render(scene, camera);
      }

      animate();
    </script>
  </body>
</html>
