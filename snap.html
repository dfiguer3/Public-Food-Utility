<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SNAP • Public Food Utility</title>
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./script.js"></script>
  </head>
  <body class="app">
    <main class="screen" data-screen="snap">
      <div class="phone" role="application" aria-label="SNAP">
        <div class="phone-bg" aria-hidden="true"></div>
        <header class="topbar">
          <a class="icon-btn" href="index.html" aria-label="Back">
            <span class="icon icon-back" aria-hidden="true"></span>
          </a>
          <button class="icon-btn" type="button" data-modal="menu" aria-label="Menu">
            <span class="icon icon-dots" aria-hidden="true"></span>
          </button>
        </header>

        <section class="content">
          <div class="snap-hero" aria-hidden="true">
            <div class="snap-hero-img"></div>
          </div>

          <div class="sheet sheet-snap" aria-label="Your SNAP">
            <div class="sheet-head">
              <h1 class="page-title">Your SNAP</h1>
              <div class="sheet-icons" aria-hidden="true">
                <span class="icon icon-dollar"></span>
                <span class="icon icon-receipt"></span>
                <span class="icon icon-card"></span>
              </div>
            </div>

            <div class="kv">
              <div class="kv-label">Balance</div>
              <div class="kv-value">$237.54</div>
            </div>
          </div>
        </section>
      </div>
    </main>

    <dialog class="modal" data-modal-root="menu" aria-label="Menu">
      <form method="dialog" class="modal-backdrop">
        <div class="modal-sheet" role="document">
          <div class="modal-head">
            <div class="modal-title">Menu</div>
            <button class="icon-btn" value="cancel" aria-label="Close">
              <span class="icon icon-x" aria-hidden="true"></span>
            </button>
          </div>
          <nav class="modal-nav" aria-label="Menu links">
            <a href="index.html">Home</a>
            <a href="events.html">Events</a>
            <a href="map.html">Map</a>
            <a href="mailbox.html">Mailbox</a>
            <a href="financial.html">Support</a>
            <a href="emergency.html">Emergency</a>
            <a href="profile.html">Profile</a>
          </nav>
        </div>
      </form>
    </dialog>
  </body>
</html>
