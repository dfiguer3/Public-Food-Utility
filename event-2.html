<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Event 2 • Public Food Utility</title>
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./script.js"></script>
  </head>
  <body class="app">
    <main class="screen" data-screen="event-2">
      <div class="phone" role="application" aria-label="Event 2">
        <div class="phone-bg" aria-hidden="true"></div>
        <header class="topbar">
          <a class="icon-btn" href="events.html" aria-label="Back">
            <span class="icon icon-back" aria-hidden="true"></span>
          </a>
          <button class="icon-btn" type="button" data-modal="menu" aria-label="Menu">
            <span class="icon icon-dots" aria-hidden="true"></span>
          </button>
        </header>

        <section class="content">
          <div class="events-hero" aria-label="Event image">
            <div class="events-hero-blank" aria-hidden="true"></div>
          </div>

          <section class="near-strip" aria-label="Near you">
            <div class="near-strip-head">
              <span class="near-strip-title">Near You</span>
              <span class="icon icon-arrow" aria-hidden="true"></span>
            </div>
            <div class="near-strip-row" role="list">
              <a class="near-chip" role="listitem" href="event-1.html" aria-label="Event 1"></a>
              <a class="near-chip" role="listitem" href="event-2.html" aria-label="Event 2"></a>
              <a class="near-chip" role="listitem" href="event-3.html" aria-label="Event 3"></a>
              <a class="near-chip" role="listitem" href="events.html" aria-label="More events"></a>
            </div>
          </section>
        </section>
      </div>
    </main>

    <dialog class="modal" data-modal-root="menu" aria-label="Menu">
      <form method="dialog" class="modal-backdrop">
        <div class="modal-sheet" role="document">
          <div class="modal-head">
            <div class="modal-title">Menu</div>
            <button class="icon-btn" value="cancel" aria-label="Close">
              <span class="icon icon-x" aria-hidden="true"></span>
            </button>
          </div>
          <nav class="modal-nav" aria-label="Menu links">
            <a href="index.html">Home</a>
            <a href="events.html">Events</a>
            <a href="map.html">Map</a>
            <a href="mailbox.html">Mailbox</a>
            <a href="snap.html">SNAP</a>
            <a href="financial.html">Support</a>
            <a href="emergency.html">Emergency</a>
            <a href="profile.html">Profile</a>
          </nav>
        </div>
      </form>
    </dialog>
  </body>
</html>
